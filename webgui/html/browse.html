<!DOCTYPE html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<style type="text/css">
html, body {
    height: 100%;
    margin: 0;
    font-family: Arial, sans-serif;
}

* {
    box-sizing: border-box;
}

button,
input,
textarea,
select {
    font: inherit;
}

textarea.input {
    border: 1px solid #cbd5e1;
    border-radius: 0.25rem;
    padding: 0.25rem;
    resize: vertical;
    display: block;
    box-sizing: border-box;
    overflow-y: auto;
    min-height: 0;
}

.fk {
    background: url(google_docs.png);
    background-size: 40px 40px;
    background-repeat: no-repeat;
    background-color: transparent;
    width: 40px;
    height: 40px;
    border: 0 !important;
    outline: 0 !important;
    box-shadow: none !important;
    padding: 0px !important;
    margin: 0px !important;
}

.tbt {
    border-collapse: collapse;
    border-width: 0px;
    width: auto !important;
}

.tbt td {
    border: 0px !important;
    padding: 0px !important;
}

#feladatkiirasok td {
    line-height: 1.2 !important;
    padding: 0.2rem !important;
}

#update-form {
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

#toolbar {
    flex-shrink: 0;
    background: #f3f4f6;
    padding: 0.25rem 0.4rem;
    border-bottom: 1px solid #d1d5db;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.2rem;
}

#table-wrapper {
    flex: 1;
    overflow: auto;
    min-height: 0;
}

#table-wrapper .dataTables_wrapper {
    min-width: 0;
}

#feladatkiirasok_wrapper,
#feladatkiirasok_wrapper table,
#feladatkiirasok {
    width: 100% !important;
}

#feladatkiirasok thead {
    display: table-header-group !important;
    visibility: visible !important;
}

#feladatkiirasok thead tr {
    display: table-row !important;
    visibility: visible !important;
}

#feladatkiirasok tbody {
    display: table-row-group !important;
}

#feladatkiirasok td,
#feladatkiirasok th {
    vertical-align: top;
}

#feladatkiirasok tbody td {
    border-bottom: 1px solid #e5e7eb;
}

#feladatkiirasok tr {
    display: table-row !important;
}

#feladatkiirasok th,
#feladatkiirasok td {
    display: table-cell !important;
    width: auto !important;
}

#feladatkiirasok th {
    font-size: 0.82rem;
    white-space: nowrap;
    background: #f3f4f6;
    color: #111827;
    border-bottom: 1px solid #d1d5db;
    padding: 0.35rem 0.4rem;
}

#feladatkiirasok td.compact-col,
#feladatkiirasok td.compact-col * {
    font-size: 0.82rem;
    line-height: 1.15;
}

#feladatkiirasok td.compact-col {
    max-width: 16rem;
    text-align: left !important;
    vertical-align: middle !important;
}

#feladatkiirasok td.compact-col .student-name {
    font-size: 0.78rem;
}

#feladatkiirasok td.compact-col .student-version {
    font-size: 0.72rem;
}

#feladatkiirasok textarea.input {
    width: 7.5rem !important;
    min-width: 7.5rem;
    max-width: 7.5rem;
}

.tbt,
.tbt tr,
.tbt td,
.tbt tbody {
    border: 0 !important;
    box-shadow: none !important;
    background: transparent !important;
}

.tbt td {
    vertical-align: middle !important;
    text-align: left !important;
}

#feladatkiirasok td:nth-child(2),
#feladatkiirasok th:nth-child(2) {
    vertical-align: middle !important;
}

.status-cell {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 60px;
}

.status-cell-top {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
}

.status-cell-ok {
    color: green;
    font-weight: bold;
    font-size: 1.2em;
}

.status-cell-no {
    color: red;
    font-weight: bold;
    font-size: 1.2em;
}

.status-cell-bottom {
    text-align: center;
    font-size: 0.9em;
    border-top: 1px solid #ccc;
    margin-top: 2px;
}

#update-popup {
    position: fixed;
    top: 1rem;
    right: 1rem;
    max-width: 320px;
    background: #1f2937;
    color: #fff;
    padding: 0.9rem 1rem;
    border-radius: 0.5rem;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
    z-index: 9999;
    display: none;
}

#update-popup .popup-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
}

#update-popup button {
    background: transparent;
    border: 1px solid #9ca3af;
    color: #fff;
    padding: 0.2rem 0.5rem;
    border-radius: 0.3rem;
    cursor: pointer;
}

.filter-toggle {
    margin-left: 0.15rem;
    padding: 0.1rem 0.45rem;
    border: 1px solid #9ca3af;
    border-radius: 0.3rem;
    cursor: pointer;
    background: #f3f4f6;
    color: #111827;
    font-size: 0.85em;
    line-height: 1.4;
}

.filter-toggle.active {
    background: #1f2937;
    color: #fff;
    border-color: #1f2937;
}

.mode-toggle {
    background: #1d4ed8;
    border: 1px solid #1e40af;
    color: #fff;
    padding: 0.1rem 0.55rem;
    font-size: 0.85em;
    line-height: 1.4;
    border-radius: 0.3rem;
    cursor: pointer;
}

#update-form input[type="submit"] {
    appearance: none;
    background: #b91c1c;
    border: 1px solid #991b1b;
    color: #fff;
    padding: 0.1rem 0.55rem;
    font-size: 0.85em;
    line-height: 1.4;
    border-radius: 0.3rem;
    cursor: pointer;
}

.filters-label {
    margin-left: 0.4rem;
    margin-right: 0.1rem;
    font-weight: 600;
}
</style>
</head>
<body>
<div id="update-popup" role="status" aria-live="polite">
    <div class="popup-row">
        <span id="update-popup-text">Update request sent.</span>
        <button type="button" id="update-popup-dismiss">Dismiss</button>
    </div>
</div>

<iframe name="updater" style="display:none;"></iframe>
<form id="update-form" action="update.php" method="POST" target="updater">
    <div id="toolbar">
        <button type="button" class="mode-toggle" onclick="parent.switchMode('review')">Review</button>
        <input type="submit" value="Update">
        <span class="filters-label">Filters</span>
        <button type="button" class="filter-toggle active" id="ok-filter-toggle" onclick="toggleOKFilter()" aria-pressed="true">OK</button>
        <button type="button" class="filter-toggle active" id="not-ok-filter-toggle" onclick="toggleNotOKFilter()" aria-pressed="true">Not OK</button>
        <button type="button" class="filter-toggle active" id="undef-filter-toggle" onclick="toggleUndefFilter()" aria-pressed="true">undef</button>
        <button type="button" class="filter-toggle" id="last-filter-toggle" onclick="toggleLastFilter()" aria-pressed="false">last</button>
    </div>
    <div id="table-wrapper">
        <table id="feladatkiirasok">
            <thead>
                <tr>
                    <th data-dynatable-column="hallgato">Hallgató</th>
                    <th data-dynatable-column="konzulens">Konzulens</th>
                    <th data-dynatable-column="ekovacsG">KovacsG</th>
                    <th data-dynatable-column="eGuszti">Guszti</th>
                    <th data-dynatable-column="eGume">Gume</th>
                    <th data-dynatable-column="ePali">Pali</th>
                    <th data-dynatable-column="status">Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</form>

<script>
function setStatus(filename, status, row, element) {
    var statusText = status === 'ok' ? 'OK' : 'Not OK';
    var statusTextElement = document.getElementById('status-text-' + filename);
    statusTextElement.textContent = statusText;
    statusTextElement = document.getElementById('status-input-' + filename);
    statusTextElement.value = statusText;

    console.log(element);
}

function fitTextareas() {
    var rows = document.querySelectorAll('#feladatkiirasok tbody tr');
    rows.forEach(function(tr) {
        var textareas = tr.querySelectorAll('textarea.input');
        if (!textareas.length) return;
        textareas.forEach(function(ta) { ta.style.height = '1px'; });
        var h = tr.clientHeight;
        textareas.forEach(function(ta) { ta.style.height = h + 'px'; });
    });
}

var isDragging = false;
document.addEventListener('mousedown', function() { isDragging = true; });
document.addEventListener('mouseup', function() {
    setTimeout(function() { isDragging = false; }, 60);
});

var resizeObserver = null;

function syncRowTextareas(source) {
    var row = source.closest('tr');
    if (!row) return;
    var h = source.offsetHeight + 'px';
    row.querySelectorAll('textarea.input').forEach(function(ta) {
        if (ta !== source) ta.style.height = h;
    });
}

function initResizeSync() {
    if (resizeObserver) resizeObserver.disconnect();
    resizeObserver = new ResizeObserver(function(entries) {
        if (!isDragging) return;
        entries.forEach(function(entry) {
            syncRowTextareas(entry.target);
        });
    });
    document.querySelectorAll('textarea.input').forEach(function(ta) {
        resizeObserver.observe(ta);
    });
}

var filterOK = true;
var filterNotOK = true;
var filterUndef = true;
var filterLast = false;
var table = null;
var updatePopupTimer = null;

function hideUpdatePopup() {
    if (updatePopupTimer) {
        clearTimeout(updatePopupTimer);
        updatePopupTimer = null;
    }
    var popup = document.getElementById('update-popup');
    if (popup) popup.style.display = 'none';
}

function showUpdatePopup(message) {
    var popup = document.getElementById('update-popup');
    var popupText = document.getElementById('update-popup-text');
    if (!popup || !popupText) return;

    popupText.textContent = message;
    popup.style.display = 'block';

    if (updatePopupTimer) clearTimeout(updatePopupTimer);
    updatePopupTimer = setTimeout(function() {
        hideUpdatePopup();
    }, 4000);
}

function initUpdatePopup() {
    var form = document.getElementById('update-form');
    var dismissButton = document.getElementById('update-popup-dismiss');
    if (!form || !dismissButton) return;

    form.addEventListener('submit', function() {
        showUpdatePopup('Update request sent.');
    });

    dismissButton.addEventListener('click', function() {
        hideUpdatePopup();
    });
}

function setFilterButtonState(buttonId, enabled) {
    var button = document.getElementById(buttonId);
    if (!button) return;
    button.classList.toggle('active', enabled);
    button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
}

function refreshFilterButtons() {
    setFilterButtonState('ok-filter-toggle', filterOK);
    setFilterButtonState('not-ok-filter-toggle', filterNotOK);
    setFilterButtonState('undef-filter-toggle', filterUndef);
    setFilterButtonState('last-filter-toggle', filterLast);
}

function normalizeStatus(status) {
    return (status || '').toString().trim().toLowerCase();
}

function applyStatusFilter() {
    if (!table) return;

    $.fn.dataTable.ext.search = [];
    $.fn.dataTable.ext.search.push(function(settings, data, dataIndex) {
        var row = table.row(dataIndex).data();
        if (!row) return true;

        var status = normalizeStatus(row.status_raw);
        var isOK = status === 'ok';
        var isNotOK = status === 'not ok';
        var isUndef = !isOK && !isNotOK;

        if (filterLast && !row.is_last) return false;

        if (isOK) return filterOK;
        if (isNotOK) return filterNotOK;
        return filterUndef;
    });

    table.draw();
}

function toggleOKFilter() {
    filterOK = !filterOK;
    refreshFilterButtons();
    applyStatusFilter();
}

function toggleNotOKFilter() {
    filterNotOK = !filterNotOK;
    refreshFilterButtons();
    applyStatusFilter();
}

function toggleUndefFilter() {
    filterUndef = !filterUndef;
    refreshFilterButtons();
    applyStatusFilter();
}

function toggleLastFilter() {
    filterLast = !filterLast;
    refreshFilterButtons();
    applyStatusFilter();
}

window.onload = function() {
    initUpdatePopup();
    refreshFilterButtons();

    $.getJSON('data.php', function(data) {
        for (var i = 0; i < data.length; i++) {
            var button = '<button class="fk" onclick="return parent.displayFK(\'' + data[i].filename + '\');"></button>';
            data[i].hallgato_raw = data[i].hallgato;
            data[i].verzio_raw = parseInt(data[i].verzio, 10) || 0;
            var verzioLabel = data[i].verzio_raw ? 'v' + data[i].verzio_raw : '';
            var hidden = '<span style="display:none">' + data[i].hallgato + '</span>';
            data[i].hallgato = '<table class="tbt" cellpadding="0" cellspacing="0" border="0"><tr>' +
                '<td class="tbd" style="width:40px!important;padding:0px">' + hidden + button + '</td>' +
                '<td class="tbd"><span class="student-name">' + data[i].hallgato_raw + ' (' + data[i].szint + ')</span></td>' +
                '<td class="tbd" style="padding:0 5px;color:#555;white-space:nowrap"><span class="student-version">' + verzioLabel + '</span></td>' +
                '</tr></table>';
            if (data[i].ekovacsG == null) data[i].ekovacsG = '';
            data[i].ekovacsG = '<textarea class="input" rows="1" cols="7" name="ekovacsG_' + data[i].filename + '">' + data[i].ekovacsG + '</textarea>';
            if (data[i].eGuszti == null) data[i].eGuszti = '';
            data[i].eGuszti = '<textarea class="input" rows="1" cols="7" name="eGuszti_' + data[i].filename + '">' + data[i].eGuszti + '</textarea>';
            if (data[i].eGume == null) data[i].eGume = '';
            data[i].eGume = '<textarea class="input" rows="1" cols="7" name="eGume_' + data[i].filename + '">' + data[i].eGume + '</textarea>';
            if (data[i].ePali == null) data[i].ePali = '';
            data[i].ePali = '<textarea class="input" rows="1" cols="7" name="ePali_' + data[i].filename + '">' + data[i].ePali + '</textarea>';
            data[i].status_raw = data[i].status;
            data[i].status =
                '<div class="status-cell">' +
                    '<span ' + data[i].status_raw + '></span>' +
                    '<div class="status-cell-top">' +
                        '<span class="status-cell-ok" style="cursor:pointer;" onclick="setStatus(\'' + data[i].filename + '\', \'ok\', ' + i + ', this)">&#10003;</span>' +
                        '<span class="status-cell-no" style="cursor:pointer;" onclick="setStatus(\'' + data[i].filename + '\', \'no\', ' + i + ', this)">&#10007;</span>' +
                    '</div>' +
                    '<div class="status-cell-bottom" id="status-text-' + data[i].filename + '">' + (data[i].status_raw || '') + '</div>' +
                    '<input type="hidden" name="status_' + data[i].filename + '" id="status-input-' + data[i].filename + '" value="' + (data[i].status || '') + '">' +
                '</div>';
        }

        var maxVerzioMap = {};
        for (var j = 0; j < data.length; j++) {
            var key = data[j].hallgato_raw;
            if (maxVerzioMap[key] === undefined || data[j].verzio_raw > maxVerzioMap[key]) {
                maxVerzioMap[key] = data[j].verzio_raw;
            }
        }
        for (var k = 0; k < data.length; k++) {
            data[k].is_last = (data[k].verzio_raw === maxVerzioMap[data[k].hallgato_raw]);
        }

        table = $('#feladatkiirasok').DataTable({
            data: data,
            columns: [
                { data: 'hallgato' },
                { data: 'konzulens' },
                { data: 'ekovacsG' },
                { data: 'eGuszti' },
                { data: 'eGume' },
                { data: 'ePali' },
                { data: 'status' }
            ],
            columnDefs: [
                { targets: [0, 1], className: 'compact-col' }
            ],
            paging: false,
            autoWidth: false,
            ordering: true,
            dom: 'lfrtip',
            deferRender: true
        });

        $('#feladatkiirasok').on('draw.dt', function() {
            fitTextareas();
            initResizeSync();
        });
        applyStatusFilter();
        fitTextareas();
        initResizeSync();
    }).error(function(jqXHR, textStatus) {
        console.log('error ' + textStatus);
        console.log('incoming Text ' + jqXHR.responseText);
    });
};
</script>
</body>
</html>
