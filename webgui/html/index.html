<!DOCTYPE html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.0.428/pdf.min.js"></script>
<style type="text/css">
html, body, #content {
    height: 100%;
    margin: 0;
}

#left {
    float: left;
    width: 50%;
    height: 100%;
    border-right: 1px solid #d1d5db;
    box-sizing: border-box;
}

#mode-frame {
    width: 100%;
    height: 100%;
    border: 0;
}

#right {
    float: left;
    width: 50%;
    height: 100%;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
}

#pdf-scroll {
    width: 100%;
    height: 100%;
    overflow: auto;
    padding: 0.5rem;
    box-sizing: border-box;
}

#pdf-controls {
    position: absolute;
    top: 0.75rem;
    left: 0.75rem;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.35rem 0.45rem;
    border: 1px solid #d1d5db;
    border-radius: 0.4rem;
    background: rgba(255, 255, 255, 0.92);
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.12);
    pointer-events: auto;
}

#pdf-controls button {
    min-width: 2rem;
    height: 2rem;
    border: 1px solid #cbd5e1;
    border-radius: 0.3rem;
    background: #ffffff;
    color: #111827;
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1;
}

#pdf-controls button:disabled {
    cursor: default;
    opacity: 0.45;
}

#zoom-level {
    min-width: 3.5rem;
    text-align: center;
    font: 600 0.85rem Arial, sans-serif;
    color: #111827;
}

#the-canvas {
    border: 1px solid black;
    display: block;
}

@media (max-width: 960px) {
    #left, #right {
        float: none;
        width: 100%;
    }

    #left {
        height: 58%;
    }

    #right {
        height: 42%;
    }
}
</style>
</head>
<body>
<div id="content">
    <div id="left">
        <iframe id="mode-frame" name="mode-frame" src=""></iframe>
    </div>

    <div id="right">
        <div id="pdf-controls" aria-label="PDF zoom controls">
            <button type="button" id="zoom-out" onclick="changePdfZoom(-0.1)">-</button>
            <button type="button" id="zoom-reset" onclick="resetPdfZoom()">100%</button>
            <button type="button" id="zoom-in" onclick="changePdfZoom(0.1)">+</button>
            <span id="zoom-level">120%</span>
        </div>
        <div id="pdf-scroll">
            <canvas id="the-canvas"></canvas>
        </div>
    </div>
</div>

<script>
pdfjsDistBuildPdf.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.0.428/pdf.worker.min.js';

function setCookie(name, value) {
    document.cookie = name + '=' + encodeURIComponent(value) + '; path=/; SameSite=Lax';
}
function getCookie(name) {
    var match = document.cookie.match(new RegExp('(?:^|; )' + name + '=([^;]*)'));
    return match ? decodeURIComponent(match[1]) : null;
}

var currentMode = getCookie('dipterv_mode') || 'browse';
var currentPdf = null;
var currentPageNumber = 1;
var currentZoom = parseFloat(getCookie('dipterv_zoom')) || 1.2;
var currentRenderTask = null;

// Set iframe to last-used mode
(function() {
    var frame = document.getElementById('mode-frame');
    if (frame) frame.src = currentMode + '.html';
})();

function updateZoomUi() {
    var zoomPercent = Math.round(currentZoom * 100);
    var zoomLabel = document.getElementById('zoom-level');
    var zoomOutButton = document.getElementById('zoom-out');
    var zoomInButton = document.getElementById('zoom-in');
    var zoomResetButton = document.getElementById('zoom-reset');
    var hasPdf = !!currentPdf;

    zoomLabel.textContent = zoomPercent + '%';
    zoomOutButton.disabled = !hasPdf || currentZoom <= 0.4;
    zoomInButton.disabled = !hasPdf || currentZoom >= 3;
    zoomResetButton.disabled = !hasPdf;
}

function renderCurrentPdfPage() {
    if (!currentPdf) return;

    currentPdf.getPage(currentPageNumber).then(function(page) {
        var viewport = page.getViewport(currentZoom);
        var canvas = document.getElementById('the-canvas');
        var context = canvas.getContext('2d');

        canvas.height = viewport.height;
        canvas.width = viewport.width;

        if (currentRenderTask && currentRenderTask.cancel) {
            currentRenderTask.cancel();
        }

        currentRenderTask = page.render({
            canvasContext: context,
            viewport: viewport
        });

        currentRenderTask.promise.then(function() {
            currentRenderTask = null;
        }).catch(function(error) {
            currentRenderTask = null;
            if (error && error.name !== 'RenderingCancelledException') {
                console.log(error);
            }
        });
    });

    updateZoomUi();
}

function switchMode(mode) {
    var nextMode = mode === 'review' ? 'review' : 'browse';
    if (currentMode === nextMode) return;

    currentMode = nextMode;
    setCookie('dipterv_mode', nextMode);
    var frame = document.getElementById('mode-frame');
    frame.src = nextMode + '.html';
}

function displayFK(filename) {
    var loadingTask = pdfjsDistBuildPdf.getDocument('descriptions/' + filename);
    loadingTask.promise.then(function(pdf) {
        currentPdf = pdf;
        currentPageNumber = 1;
        renderCurrentPdfPage();
    });

    return false;
}

function changePdfZoom(delta) {
    if (!currentPdf) return;

    currentZoom = Math.max(0.4, Math.min(3, Math.round((currentZoom + delta) * 10) / 10));
    setCookie('dipterv_zoom', currentZoom);
    renderCurrentPdfPage();
}

function resetPdfZoom() {
    if (!currentPdf) return;

    currentZoom = 1;
    setCookie('dipterv_zoom', currentZoom);
    renderCurrentPdfPage();
}

window.switchMode = switchMode;
window.displayFK = displayFK;
window.changePdfZoom = changePdfZoom;
window.resetPdfZoom = resetPdfZoom;
updateZoomUi();
</script>
</body>
</html>
